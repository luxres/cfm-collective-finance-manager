{# PARTIAL: HTMX fragment for this feature's page only. #}
<form
    method="post"
    hx-post="{% url 'add_external_party_htmx' %}"
    hx-target="#modalContent"
    hx-swap="innerHTML">

    {% csrf_token %}

    <div class="modal-header">

        <h5 class="modal-title">
            Add External Party
        </h5>

        <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal">
        </button>

    </div>

    <div class="modal-body">

        {% if form.non_field_errors %}
            <div class="alert alert-danger">
                {{ form.non_field_errors }}
            </div>
        {% endif %}

        <div class="row g-3">

            {% for field in form %}

                <div class="col-12">

                    <label class="form-label">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <div class="text-danger small">
                            {{ field.errors|striptags }}
                        </div>
                    {% endif %}

                </div>

            {% endfor %}

        </div>

    </div>

    <div class="modal-footer">

        <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal">
            Cancel
        </button>

        <button
            type="submit"
            class="btn btn-success">
            Create External Party
        </button>

    </div>

</form>
