{# PARTIAL: HTMX fragment for this feature's page only. #}
<form
    method="post"
    {% if account %}
        hx-post="{% url 'edit_cash_account_htmx' account.id %}"
    {% else %}
        hx-post="{% url 'add_cash_account_htmx' holder.id %}"
    {% endif %}
    hx-target="#account-container"
    hx-swap="innerHTML">

  {% csrf_token %}

  <div class="modal-header">

      {% if account %}
        Edit Cash Account #{{ account.id }} ({{ holder.name }})
      {% else %}
        Add Cash Account for {{ holder.name }}
      {% endif %}

      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
  </div>

  <div class="modal-body">

    {% if form.non_field_errors %}
      <div class="alert alert-danger">
        {{ form.non_field_errors }}
      </div>
    {% endif %}

    <div class="row g-3">


      <!-- NAME -->
      <div class="col-12">
        <label class="form-label">Name of Cash Account</label>
        {{ form.name }}
      </div>

    </div>
  </div>

  <div class="modal-footer">

    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
      Cancel
    </button>

    <button type="submit" class="btn btn-success">
      {% if account %}
        Save Changes
      {% else %}
        Create Account
      {% endif %}
    </button>

  </div>
</form>
