{# COMPONENT: reusable fragment, {% include %}'d from more than one page. #}
<!-- ========================================================= -->
<!-- COLLECTIVE SWITCHER -->
<!-- ========================================================= -->

<div class="card mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">

        <strong>Collective</strong>

        <form method="GET">
            <select name="collective"
                    class="form-select form-select-sm"
                    onchange="this.form.submit()">

                {% for c in collectives %}
                    <option value="{{ c.id }}"
                        {% if active_collective and c.id == active_collective.id %}
                            selected
                        {% endif %}>
                        {{ c.name }}
                    </option>
                {% endfor %}

            </select>
        </form>

    </div>
</div>
