{% extends "base.html" %}

{% block title %}Logged out{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">

        <div class="card shadow-sm">
            <div class="card-body text-center">

                <h3>You have been logged out</h3>

            </div>
        </div>

    </div>
</div>

{% endblock %}
